# Copie este archivo como .streamlit/secrets.toml SOLO en local.
# En Streamlit Community Cloud, configure estos valores desde App settings > Secrets.

APP_ENV = "production"

# Recomendado: Supabase/PostgreSQL u otro PostgreSQL administrado.
# Ejemplo de Supabase: postgresql://postgres.xxxxx:CLAVE@aws-0-us-east-1.pooler.supabase.com:6543/postgres
DATABASE_URL = "postgresql://USUARIO:CLAVE@HOST:5432/BASE"

# Credencial inicial de arranque. Cambiar al primer ingreso.
INITIAL_ADMIN_USER = "admin"
INITIAL_ADMIN_PASSWORD = "Cambiar_Esta_Clave_123*"
INITIAL_ADMIN_NAME = "Administrador del sistema"
INITIAL_ADMIN_EMAIL = "admin@institucion.edu.co"

# Límite por archivo de evidencia guardado en base de datos.
MAX_EVIDENCE_MB = 15
